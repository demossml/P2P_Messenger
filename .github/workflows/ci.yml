name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      validation:
        description: 'Manual validation target'
        required: true
        default: smoke-and-e2e
        type: choice
        options:
          - smoke-only
          - ws-strict-only
          - smoke-minimal
          - e2e-minimal
          - e2e-only
          - e2e-full-retry
          - validate-fast
          - validate-full
          - release-readiness
          - release-readiness-live
          - pre-release-full
          - pre-release-live
          - smoke-and-e2e
          - smoke-e2e-k6

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  manual-validation:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: development
      PORT: 3001
      ALLOWED_ORIGIN: http://localhost:5173
      REDIS_URL: redis://127.0.0.1:6379
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/p2p_messenger
      ROOM_MAX_PEERS: 8
      ROOM_TTL_SECONDS: 86400
      WS_RATE_LIMIT_PER_SECOND: 10
      TURN_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      TURN_HOST: turn.yourdomain.com
      TURN_REALM: turn.yourdomain.com
      TURN_CREDENTIALS_TTL_SECONDS: 3600
      JWT_PRIVATE_KEY: |
