name: K6 Signaling

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "k6 profile to run"
        required: true
        default: quick
        type: choice
        options:
          - quick
          - stress
  schedule:
    - cron: "0 2 * * *"

jobs:
  k6-signaling:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      K6_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.profile || 'quick' }}
      NODE_ENV: development
      PORT: 3001
      ALLOWED_ORIGIN: http://localhost:5173
      REDIS_URL: redis://127.0.0.1:6379
      POSTGRES_URL: postgresql://postgres:postgres@127.0.0.1:5432/p2p_messenger
      ROOM_MAX_PEERS: 8
      ROOM_TTL_SECONDS: 86400
      WS_RATE_LIMIT_PER_SECOND: 10
      TURN_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      TURN_HOST: turn.yourdomain.com
      TURN_REALM: turn.yourdomain.com
      TURN_CREDENTIALS_TTL_SECONDS: 3600
