    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start signaling server
        run: |
          pnpm --filter @p2p/server exec node --import tsx src/index.ts > /tmp/signaling.log 2>&1 &
          echo $! > /tmp/signaling.pid

      - name: Wait for health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become healthy in time"
          tail -n 120 /tmp/signaling.log || true
          exit 1

      - name: Run k6 quick profile
        if: ${{ env.K6_PROFILE == 'quick' }}
        run: pnpm load:k6:signaling:quick:summary

      - name: Run k6 stress profile
        if: ${{ env.K6_PROFILE == 'stress' }}
        run: pnpm load:k6:signaling:stress:summary

      - name: Render k6 run summary
        if: always()
        run: |
          SUMMARY_FILE="artifacts/k6/signaling-${K6_PROFILE}-summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            node scripts/load/render-k6-summary.mjs "$SUMMARY_FILE" "$K6_PROFILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### K6 Summary (${K6_PROFILE})" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Summary file not found: \`$SUMMARY_FILE\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fetch previous baseline artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/load/fetch-latest-k6-baseline.mjs "${K6_PROFILE}" "artifacts/k6/${K6_PROFILE}-baseline.json"

      - name: Compare current run against previous baseline
        run: |
          if [ -f "artifacts/k6/${K6_PROFILE}-baseline.json" ]; then
            pnpm load:k6:compare -- "artifacts/k6/${K6_PROFILE}-baseline.json" "artifacts/k6/signaling-${K6_PROFILE}-summary.json"
          else
            echo "No previous baseline found for profile ${K6_PROFILE}; skipping compare."
          fi

      - name: Render k6 trend
        if: always()
        run: |
          SUMMARY_FILE="artifacts/k6/signaling-${K6_PROFILE}-summary.json"
          BASELINE_FILE="artifacts/k6/${K6_PROFILE}-baseline.json"
          if [ -f "$SUMMARY_FILE" ]; then
            node scripts/load/render-k6-trend.mjs "$SUMMARY_FILE" "$BASELINE_FILE" "$K6_PROFILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### K6 Trend (${K6_PROFILE})" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Summary file not found: \`$SUMMARY_FILE\`" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload k6 summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-signaling-${{ env.K6_PROFILE }}-summary
          path: artifacts/k6/signaling-${{ env.K6_PROFILE }}-summary.json
          if-no-files-found: error

      - name: Upload signaling log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signaling-log-${{ github.run_id }}
          path: /tmp/signaling.log
          if-no-files-found: warn

      - name: Stop signaling server
        if: always()
        run: |
          if [ -f /tmp/signaling.pid ]; then
            kill "$(cat /tmp/signaling.pid)" || true
          fi
