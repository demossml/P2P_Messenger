services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: p2p_messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d p2p_messenger']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    command: ['-c', '/etc/coturn/turnserver.conf']
    volumes:
      - ./apps/turn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - '3478:3478/udp'
      - '3478:3478/tcp'
      - '5349:5349/tcp'
      - '49152-49200:49152-49200/udp'
    depends_on:
      - redis

  server:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: ['sh', '-c', 'corepack enable && pnpm install && pnpm --filter @p2p/server dev']
    volumes:
      - .:/workspace
    env_file:
      - .env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
